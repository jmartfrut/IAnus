<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 520" width="520" height="520">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#111e3a"/>
      <stop offset="100%" style="stop-color:#0a1628"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e8a020"/>
      <stop offset="100%" style="stop-color:#f5b940"/>
    </linearGradient>
  </defs>

  <rect width="520" height="520" rx="80" ry="80" fill="url(#bg)"/>

  <!-- Versión minimalista moderna — pocos bloques, mucho espacio, tipografía grande -->
  <!-- Bloques grandes con fuerte presencia -->

  <!-- Bloque azul grande arriba izquierda -->
  <rect x="44"  y="44"  width="110" height="76" rx="16" fill="#2855a0" opacity="0.85" transform="rotate(-4, 99, 82)"/>
  <!-- Bloque dorado mediano, solapado -->
  <rect x="130" y="64"  width="68"  height="68"  rx="14" fill="#e8a020" opacity="0.9"  transform="rotate(3, 164, 98)"/>
  <!-- Bloque ghost pequeño -->
  <rect x="210" y="50"  width="46"  height="46"  rx="10" fill="rgba(255,255,255,0.06)" transform="rotate(-2, 233, 73)"/>

  <!-- Bloque azul claro flotante -->
  <rect x="294" y="42"  width="80"  height="56"  rx="14" fill="#3a7bd5" opacity="0.6"  transform="rotate(4, 334, 70)"/>
  <!-- Bloque dorado pequeño esquina derecha -->
  <rect x="388" y="58"  width="52"  height="52"  rx="12" fill="#e8a020" opacity="0.75" transform="rotate(-5, 414, 84)"/>

  <!-- Bloque grande central izquierda -->
  <rect x="36"  y="148" width="86"  height="96"  rx="16" fill="#e8a020" opacity="0.8"  transform="rotate(3, 79, 196)"/>
  <!-- Ghost mediano junto -->
  <rect x="132" y="160" width="54"  height="54"  rx="11" fill="rgba(255,255,255,0.06)" transform="rotate(-2, 159, 187)"/>

  <!-- Bloque azul derecha alto -->
  <rect x="376" y="142" width="76"  height="106" rx="16" fill="#2855a0" opacity="0.8"  transform="rotate(-3, 414, 195)"/>
  <!-- Pequeño dorado solapado -->
  <rect x="318" y="158" width="52"  height="52"  rx="11" fill="#e8a020" opacity="0.7"  transform="rotate(4, 344, 184)"/>

  <!-- Bloques centrales — los más flotantes, irregulares -->
  <rect x="188" y="130" width="62"  height="86"  rx="14" fill="#2855a0" opacity="0.75" transform="rotate(-2, 219, 173)"/>
  <rect x="264" y="118" width="44"  height="44"  rx="10" fill="#3a7bd5" opacity="0.55" transform="rotate(3, 286, 140)"/>
  <rect x="264" y="174" width="68"  height="50"  rx="12" fill="rgba(255,255,255,0.06)" transform="rotate(-3, 298, 199)"/>

  <!-- Bloque bajo izquierda -->
  <rect x="44"  y="264" width="72"  height="52"  rx="13" fill="#3a7bd5" opacity="0.55" transform="rotate(-3, 80, 290)"/>
  <!-- Bloque bajo derecha -->
  <rect x="396" y="270" width="66"  height="48"  rx="13" fill="#3a7bd5" opacity="0.5"  transform="rotate(3, 429, 294)"/>

  <!-- Bloque ghost bajo centro -->
  <rect x="200" y="242" width="52"  height="38"  rx="10" fill="rgba(255,255,255,0.05)" transform="rotate(2, 226, 261)"/>
  <rect x="268" y="236" width="42"  height="46"  rx="10" fill="#e8a020" opacity="0.55" transform="rotate(-2, 289, 259)"/>

  <!-- === LOGOTYPE — más grande, con más aire === -->
  <text x="260" y="418"
        font-family="'Arial Black', 'Arial', sans-serif"
        font-size="90"
        font-weight="900"
        text-anchor="middle"
        fill="white"
        letter-spacing="-3">IAnus</text>

  <rect x="110" y="430" width="300" height="4" rx="2" fill="url(#gold)"/>

  <text x="260" y="470"
        font-family="'Arial', sans-serif"
        font-size="13"
        text-anchor="middle"
        fill="rgba(255,255,255,0.4)"
        letter-spacing="6">GESTOR DE HORARIOS</text>
</svg>
